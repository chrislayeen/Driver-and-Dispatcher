{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scanner | BURGERS Fleet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #qr-reader { border: none !important; width: 100% !important; height: 100% !important; border-radius: 2rem; overflow: hidden; background: transparent !important; position: absolute !important; inset: 0 !important; }
        #qr-reader__scan_region { width: 100% !important; height: 100% !important; background: transparent !important; display: block !important; position: absolute !important; inset: 0 !important; }
        #qr-reader video { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; object-fit: cover !important; border-radius: 2rem !important; }
        #qr-reader__dashboard { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-[#101722] flex flex-col max-w-md mx-auto relative shadow-2xl overflow-hidden">
    <header class="h-[72px] bg-[#215EFA] flex items-center justify-between px-5 shrink-0 w-full relative">
        <a href="{% url 'role_select' %}" class="w-10 h-10 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center active:scale-95 transition-transform" style="padding-left: 6px;">
            <span class="material-symbols-outlined text-white text-[1.2rem]">arrow_back_ios</span>
        </a>
        <img src="https://burgersgroup.com/wp-content/uploads/2025/05/logo-blue.svg" alt="Burgers" class="h-5 brightness-0 invert absolute left-1/2 -translate-x-1/2">
        <button class="h-9 px-3 rounded-xl border border-white/20 bg-white/5 flex items-center gap-1.5 text-white active:scale-95 transition-transform">
            <span class="material-symbols-outlined text-[1.1rem]">language</span>
            <span class="text-[0.65rem] font-bold tracking-widest mt-0.5">EN</span>
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-5 pb-10 gap-8">
        <div class="w-full aspect-square bg-[#05080e] rounded-[2rem] relative shadow-2xl border border-white/[0.04]">
            <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center z-10 transition-opacity duration-300">
                <p class="text-slate-400 text-sm font-bold tracking-wide mb-3">Ready to Scan</p>
                <div class="w-2.5 h-2.5 bg-[#215EFA] rounded-full animate-pulse shadow-[0_0_15px_rgba(33,94,250,0.8)]"></div>
            </div>
            <div id="qr-reader" class="z-0"></div>
        </div>

        <div id="action-buttons" class="w-full flex flex-col gap-4">
            <button id="btn-start-scan" class="w-full h-12 bg-[#215EFA] text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">qr_code_scanner</span>
                Start Scan
            </button>
            <button id="btn-manual-entry" class="w-full h-12 border-2 border-slate-700 text-slate-300 font-bold rounded-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">edit_square</span>
                Enter Chassis Manually
            </button>
        </div>

        <div id="manual-entry-form" class="w-full hidden animate-in fade-in slide-in-from-bottom-4 duration-300">
            <div class="bg-[#1e293b] p-6 rounded-3xl border border-white/10 shadow-2xl">
                <h3 class="text-white font-bold text-center mb-4">Manual Entry</h3>
                <input type="text" id="chassis-input" placeholder="Enter Chassis Number..." class="w-full bg-[#0f172a] border-2 border-slate-700 text-white rounded-xl px-4 h-12 mb-4 focus:border-[#215EFA] outline-none transition-colors uppercase font-mono">
                <div class="flex gap-3">
                    <button id="btn-cancel-manual" class="flex-1 h-12 border border-slate-700 text-slate-400 font-bold rounded-xl active:scale-95 transition-transform">Cancel</button>
                    <button id="btn-submit-manual" class="flex-1 h-12 bg-[#215EFA] text-white font-bold rounded-xl active:scale-95 transition-transform">Verify</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const btnStartScan = document.getElementById('btn-start-scan');
        const btnManualEntry = document.getElementById('btn-manual-entry');
        const actionButtons = document.getElementById('action-buttons');
        const manualEntryForm = document.getElementById('manual-entry-form');
        const chassisInput = document.getElementById('chassis-input');
        const btnSubmitManual = document.getElementById('btn-submit-manual');
        const btnCancelManual = document.getElementById('btn-cancel-manual');
        const scannerPlaceholder = document.getElementById('scanner-placeholder');

        let html5QrCode = null;

        function handleSuccess(identityString) {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.error(err));
            }
            // WORKAROUND: Bypassing NoReverseMatch server error with hardcoded path
            window.location.href = "/driver/trailer-auth/";
        }

        btnStartScan.addEventListener('click', () => {
            scannerPlaceholder.style.opacity = '0';
            btnStartScan.disabled = true;
            btnStartScan.textContent = "Initializing camera...";
            setTimeout(() => {
                html5QrCode = new Html5Qrcode("qr-reader");
                const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText) => { handleSuccess(decodedText); },
                    (errorMessage) => {}
                ).catch((err) => {
                    console.error(err);
                    alert("Camera error: " + err);
                    btnStartScan.disabled = false;
                    btnStartScan.innerHTML = '<span class="material-symbols-outlined">qr_code_scanner</span> START SCAN';
                    scannerPlaceholder.style.opacity = '1';
                });
            }, 300);
        });

        btnManualEntry.addEventListener('click', () => {
            actionButtons.classList.add('hidden');
            manualEntryForm.classList.remove('hidden');
            chassisInput.focus();
        });

        btnCancelManual.addEventListener('click', () => {
            manualEntryForm.classList.add('hidden');
            actionButtons.classList.remove('hidden');
        });

        btnSubmitManual.addEventListener('click', () => {
            if (chassisInput.value.trim().length > 0) {
                handleSuccess(chassisInput.value);
            } else {
                chassisInput.classList.add('border-red-500');
                setTimeout(() => chassisInput.classList.remove('border-red-500'), 1000);
            }
        });

        chassisInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { btnSubmitManual.click(); }
        });
    </script>
</body>
</html>
